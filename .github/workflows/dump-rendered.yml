name: Debug - dump rendered page

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'URL to render, or an Open Brewery DB id (resolves to its website)'
        required: true
        type: string
      click:
        description: 'Optional text (regex, case-insensitive) of a button to click after load, e.g. an age gate'
        required: false
        type: string

permissions:
  contents: write

jobs:
  dump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install headless browser
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium
      - name: Render and save
        run: |
          NODE_PATH=$(npm root -g) node -e "
          const { fetchRendered, closeBrowser } = require('./pipeline/browser');
          (async () => {
            let url = process.env.TARGET;
            if (!/^https?:/.test(url)) {
              const res = await fetch('https://api.openbrewerydb.org/v1/breweries/' + url);
              url = (await res.json()).website_url;
              console.log('resolved website:', url);
            }
            const opts = { timeoutMs: 30000 };
            if (process.env.CLICK) opts.clickText = new RegExp(process.env.CLICK, 'i');
            const html = await fetchRendered(url, opts);
            require('fs').writeFileSync('rendered.html', html);
            console.log('saved', html.length, 'bytes from', url);
            await closeBrowser();
          })().catch((e) => { console.error(e); process.exit(1); });"
        env:
          TARGET: ${{ inputs.target }}
          CLICK: ${{ inputs.click }}
      # artifacts live on Azure blob storage, unreachable from the dev
      # sandbox — a throwaway branch is fetchable through the git proxy
      - name: Push dump to debug-dump branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout --orphan debug-dump
          git rm -rfq --cached .
          git add -f rendered.html
          git commit -m "dump: ${{ inputs.target }}"
          git push -f origin HEAD:debug-dump
