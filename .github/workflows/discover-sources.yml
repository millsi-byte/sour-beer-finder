name: Discover tap-list sources

on:
  workflow_dispatch:
    inputs:
      center:
        description: 'Area center: "lat,lng" (best) or "City, Full State Name"'
        required: true
        type: string
      label:
        description: 'Display label for the area, e.g. "Tampa, FL"'
        required: false
        type: string

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Scan brewery websites for tap-list widgets
        run: node pipeline/discover.js "${{ inputs.center }}" "${{ inputs.label }}"
      - name: Build tap data with the new sources
        run: node pipeline/build.js
        env:
          UNTAPPD_EMAIL: ${{ secrets.UNTAPPD_EMAIL }}
          UNTAPPD_TOKEN: ${{ secrets.UNTAPPD_TOKEN }}
      - name: Commit discovered sources and data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pipeline/sources.json pipeline/areas.json data/taps.json
          git diff --cached --quiet || { git commit -m "Discover tap-list sources: ${{ inputs.label || inputs.center }}"; git push; }
