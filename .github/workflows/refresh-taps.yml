name: Refresh tap lists

on:
  schedule:
    - cron: '17 9 * * *' # nightly, ~4-5am US East
  workflow_dispatch:
    inputs:
      discover:
        description: 'Re-scan areas for new widgets first (slow); "false" = rebuild data from known sources only'
        required: false
        default: 'true'
        type: string

permissions:
  contents: write

# never two data-writing runs pushing at once (also shared with discovery)
concurrency:
  group: taps-data

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install headless browser (sees through bot walls + JS sites)
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
      # One area at a time, each committed as soon as it finishes — a
      # failed or hung area is skipped (and retried by the next nightly
      # run), never taking the whole crawl down with it.
      # Nightly cron rotates: each city gets a full crawl once a week
      # (new widgets appear rarely); manual dispatch crawls everything.
      - name: Re-scan covered areas, one by one
        if: ${{ inputs.discover != 'false' }}
        env:
          ROTATE: ${{ github.event_name == 'schedule' && '1' || '' }}
        run: |
          python3 -c "
          import json, os, datetime
          rotate = bool(os.environ.get('ROTATE'))
          dow = datetime.datetime.utcnow().weekday()
          for i, a in enumerate(json.load(open('pipeline/areas.json'))):
              if rotate and i % 7 != dow: continue
              print(f\"{a['center']}\t{a['label']}\")" > /tmp/areas.tsv
          echo "areas tonight:"; cat /tmp/areas.tsv
          mapfile -t LINES < /tmp/areas.tsv
          FAILED=""; PREV=""
          for idx in "${!LINES[@]}"; do
            IFS=$'\t' read -r CENTER LABEL <<< "${LINES[$idx]}"
            QUEUE=$(python3 -c "
          import sys, json
          print(json.dumps([l.split('\t')[1] for l in sys.argv[1:]]))" "${LINES[@]:idx+1}")
            bash pipeline/push-status.sh discovery "$LABEL" "$QUEUE" "$PREV" || true
            PREV=""
            echo "===== $LABEL ====="
            if timeout 1500 env NODE_PATH=$(npm root -g) node pipeline/discover.js "$CENTER" "$LABEL"; then
              PREV="$LABEL"
              python3 pipeline/safe-push.py "Discover tap-list sources: $LABEL"
            else
              echo "::warning::$LABEL scan failed or timed out — skipping, next nightly run retries it"
              git checkout -- pipeline/sources.json pipeline/areas.json 2>/dev/null || true
              FAILED="$FAILED $LABEL"
            fi
          done
          bash pipeline/push-status.sh menus "" "[]" "$PREV" || true
          [ -n "$FAILED" ] && echo "::warning::Areas to retry next run:$FAILED"
          true
      - name: Build tap data
        run: NODE_PATH=$(npm root -g) node pipeline/build.js
        env:
          UNTAPPD_EMAIL: ${{ secrets.UNTAPPD_EMAIL }}
          UNTAPPD_TOKEN: ${{ secrets.UNTAPPD_TOKEN }}
          UNTAPPD_CLIENT_ID: ${{ secrets.UNTAPPD_CLIENT_ID }}
          UNTAPPD_CLIENT_SECRET: ${{ secrets.UNTAPPD_CLIENT_SECRET }}
      - name: Commit updated data
        run: python3 pipeline/safe-push.py "Refresh tap data"
      - name: Publish idle status
        if: always()
        run: bash pipeline/push-status.sh idle "" "[]" || true
