name: Refresh tap lists

on:
  schedule:
    - cron: '17 9 * * *' # nightly, ~4-5am US East
  workflow_dispatch:
    inputs:
      discover:
        description: 'Re-scan areas for new widgets first (slow); "false" = rebuild data from known sources only'
        required: false
        default: 'true'
        type: string

permissions:
  contents: write

# never two data-writing runs pushing at once (also shared with discovery)
concurrency:
  group: taps-data

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install headless browser (sees through bot walls + JS sites)
        run: |
          npm install -g playwright
          npx playwright install --with-deps chromium
      - name: Re-scan covered areas for new tap-list widgets
        if: ${{ inputs.discover != 'false' }}
        run: NODE_PATH=$(npm root -g) node pipeline/discover.js --all
      - name: Build tap data
        run: NODE_PATH=$(npm root -g) node pipeline/build.js
        env:
          UNTAPPD_EMAIL: ${{ secrets.UNTAPPD_EMAIL }}
          UNTAPPD_TOKEN: ${{ secrets.UNTAPPD_TOKEN }}
      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/taps.json pipeline/sources.json
          git diff --cached --quiet && exit 0
          git commit -m "Refresh tap data"
          # main may have moved during a long crawl — rebase and retry
          for i in 1 2 3; do
            git pull --rebase origin main && git push && exit 0
            sleep 5
          done
          exit 1
