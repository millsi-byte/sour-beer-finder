<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>SourSeeker</title>
<meta name="description" content="Find sour beers on tap near you">

<!-- PWA / iOS standalone -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SourSeeker">
<meta name="theme-color" content="#101014">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<link rel="icon" type="image/png" href="icons/icon-180.png">

<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>SourSeeker</h1>
  <button id="btnRefresh" class="iconbtn" aria-label="Refresh" title="Refresh">&#x21bb;</button>
</header>

<main id="main">

  <!-- Landing / locate -->
  <section id="viewLocate" class="view">
    <div class="hero">
      <div class="hero-emoji">&#x1F37A;&#x1F34B;</div>
      <h2>Sour beers on tap, near you</h2>
      <p>Find every brewery around you, then check what&rsquo;s pouring.</p>
      <button id="btnLocate" class="primary">Use my location</button>
      <div class="divider"><span>or</span></div>
      <form id="cityForm" class="cityform" autocomplete="off">
        <input id="cityInput" type="text" placeholder="City, ST &mdash; e.g. Tampa, FL" enterkeyhint="search">
        <button type="submit" class="secondary">Search</button>
      </form>
      <p id="locateError" class="error" hidden></p>
    </div>
  </section>

  <!-- Results -->
  <section id="viewList" class="view" hidden>
    <div class="listmeta">
      <span id="listTitle"></span>
      <button id="btnNewSearch" class="linkbtn">New search</button>
    </div>
    <ul id="breweryList" class="cards"></ul>
    <p class="footnote">Brewery data: Open Brewery DB &middot; &#x1F34B; = sours on tap</p>
  </section>

  <!-- Loading -->
  <div id="spinner" class="spinner" hidden><div class="ring"></div></div>
</main>

<!-- Detail bottom sheet -->
<div id="sheetBackdrop" class="sheet-backdrop" hidden></div>
<div id="sheet" class="sheet" hidden>
  <div class="grabber"></div>
  <h3 id="sheetName"></h3>
  <p id="sheetSub" class="sheet-sub"></p>
  <div class="sour-placeholder">
    <span id="sourBadge" class="sour-badge">&#x1F34B; Tap list</span>
    <p id="sourBody"></p>
    <ul id="sourList" class="sour-list" hidden></ul>
  </div>
  <div class="sheet-actions">
    <a id="actUntappd" class="action" target="_blank" rel="noopener">&#x1F37A; Untappd</a>
    <a id="actWebsite" class="action" target="_blank" rel="noopener">&#x1F310; Website</a>
    <a id="actMaps" class="action" target="_blank" rel="noopener">&#x1F5FA; Directions</a>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
